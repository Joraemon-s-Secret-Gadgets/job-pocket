# ==========================================
# pytest.ini — Job-Pocket 테스트 설정
# ==========================================

[pytest]
# 테스트 대상 디렉토리
testpaths = backend/tests

# 테스트 파일 명명 규약
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 경로 설정 - backend를 import 가능하게 함
pythonpath = backend

# 출력 옵션
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

# 커스텀 마커 정의
markers =
    integration: 통합 테스트 (실제 DB 사용)
    api: API 엔드포인트 테스트
    slow: 실행 시간이 긴 테스트 (1초 이상)
    retriever: Retriever 관련 테스트 (FAISS 인덱스 필요)
    mock_llm: LLM 호출이 mocked된 테스트
    requires_llm: 실제 LLM API 호출이 필요한 테스트 (eval용)

# 최소 버전
minversion = 8.0

# 경고 필터
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:streamlit.*

# 로그 설정
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S
