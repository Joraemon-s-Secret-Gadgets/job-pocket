name: Code Review on Tag

permissions:
    contents: read
    issues: write

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    code-review:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Get changed files
              id: changed
              run: |
                  # 이전 태그와 현재 태그 사이의 변경 파일 추출
                  PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
                  CURR_TAG=${GITHUB_REF#refs/tags/}

                  if [ -z "$PREV_TAG" ]; then
                    # 첫 번째 태그면 전체 파일
                    git diff --name-only HEAD~1 HEAD > changed_files.txt
                  else
                    git diff --name-only $PREV_TAG $CURR_TAG > changed_files.txt
                  fi

                  echo "DIFF<<EOF" >> $GITHUB_OUTPUT
                  git diff ${PREV_TAG:-HEAD~1} ${CURR_TAG} -- '*.py' >> diff.txt || true
                  echo "EOF" >> $GITHUB_OUTPUT

